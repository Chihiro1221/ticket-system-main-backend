spring:
  application:
    name: ticket-system-main-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ticket_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: youzhi..
  mvc:
    # 遇到 404 时抛出异常，由全局异常处理器统一处理
    throw-exception-if-no-handler-found: true
  web:
    resources:
      # 禁用静态资源映射，让 404 能够被捕获
      add-mappings: false

server:
  port: 8080

# 日志配置
logging:
  level:
    com.haonan.ticketsystemmainbackend: INFO
    io.dapr: INFO

jwt:
  secret: ticket-system-main-backend-jwt-secret-key-2026
  expire-seconds: 7200
  issuer: ticket-system-main-backend
